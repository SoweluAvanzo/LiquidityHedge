# Fly.io configuration for LP Strategy Multi-User API
# Deploy with: flyctl deploy -c test_deployment_v2/fly-api.toml

app = "lp-strategy-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.api"

[env]
  # API settings
  API_PORT = "8000"
  ENV = "production"
  LOG_LEVEL = "INFO"

  # CORS settings (comma-separated origins)
  CORS_ORIGINS = "https://lp-strategy-frontend.fly.dev,http://localhost:3000"

  # JWT settings
  JWT_ALGORITHM = "HS256"
  JWT_EXPIRY_HOURS = "24"
  NONCE_EXPIRY_MINUTES = "5"

  # Celery settings (uses REDIS_URL secret)
  CELERY_BROKER_URL = ""  # Set via secrets

  # Data directory
  DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    restart_limit = 3
    timeout = "10s"

  [[services.http_checks]]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/health"
    timeout = "5s"

[mounts]
  source = "lp_multiuser_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# fly.toml - LP Strategy v2 Production 1 Configuration
# Deploy from project root: cd /home/sowelo/Scrivania/STLService && flyctl deploy -c test_deployment_v2/fly-production1.toml

app = 'production1'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  # === Data Directory ===
  DATA_DIR = '/data'

  # === Session Settings ===
  SESSION_DURATION_MINUTES = '600000'
  MAX_POSITIONS = '1'
  CHECK_INTERVAL_SECONDS = '60'

  # === Strategy Parameters ===
  # Aggression coefficient K (range width relative to ATR)
  K_COEFFICIENT = '0.60'
  K_MIN = '0.55'
  K_MAX = '0.65'

  # Range bounds (as decimal)
  MIN_RANGE = '0.03'
  MAX_RANGE = '0.07'

  # === ATR Configuration ===
  ATR_PERIOD_DAYS = '14'
  ATR_RECALC_INTERVAL_HOURS = '4'
  MIN_HOURS_BETWEEN_RANGE_UPDATES = '4'
  ATR_CHANGE_THRESHOLD = '0.01'

  # === Rebalance Rules ===
  MAX_REBALANCES_PER_DAY = '8'
  RATIO_SKEW_HIGH = '1.0'
  RATIO_SKEW_LOW = '0.00'
  EMERGENCY_ATR_MULTIPLE = '3.0'
  SLIPPAGE_BPS = '15'

  # === Stop Loss Config ===
  STOP_LOSS_ENABLED = 'true'
  STOP_LOSS_OUT_OF_RANGE_DURATION_MIN = '10'
  STOP_LOSS_PRICE_DECLINE_THRESHOLD = '0.008'
  STOP_LOSS_COOLDOWN_MIN = '10'
  STOP_LOSS_SWAP_PERCENTAGE = '0.8'
  STOP_LOSS_SLIPPAGE_BPS = '100'

  # === Upward Rebalance Policy (asymmetric upward profit capture) ===
  UPWARD_REBALANCE_ENABLED = 'true'
  UPWARD_REBALANCE_THRESHOLD_PCT = '0.0005'
  UPWARD_REBALANCE_MIN_INTERVAL_MIN = '6'
  UPWARD_REBALANCE_COOLDOWN_MIN = '12'

  # === Capital Settings ===
  MAX_SOL_PER_POSITION = '50.0'
  MAX_USDC_PER_POSITION = '10000.0'
  MIN_SOL_RESERVE = '0.10'
  CAPITAL_DEPLOYMENT_PCT = '0.95'

  # === Swap Settings ===
  SWAP_ENABLED = 'true'
  SWAP_IMBALANCE_THRESHOLD = '0.05'
  SWAP_SLIPPAGE_BPS = '15'
  SWAP_MIN_USD = '30'
  JUPITER_ONLY_DIRECT_ROUTES = 'true'
  JUPITER_MAX_ACCOUNTS = '20'

  # === Jupiter Ultra API Settings ===
  JUPITER_USE_ULTRA = 'true'
  JUPITER_ULTRA_GASLESS = 'true'
  JUPITER_ULTRA_FALLBACK = 'true'
  JUPITER_ULTRA_CIRCUIT_BREAKER = '3'
  JUPITER_ULTRA_COOLDOWN_SEC = '300'

  # === Pool Configuration ===
  # 0.04% fee pool (tick_spacing=4)
  SOL_USDC_POOL = 'Czfq3xZZDmsdGdUyrNLtRhGc47cXcZtLG4crryfu44zE'

  # === Network ===
  SOLANA_NETWORK = 'mainnet-beta'

# Persistent storage for session data, logs, and CSV exports
[[mounts]]
  source = 'production1_data'
  destination = '/data'

# VM Configuration
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# HTTP service configuration
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

# Health check configuration
[[http_service.checks]]
  interval = '30s'
  timeout = '10s'
  grace_period = '30s'
  method = 'GET'
  path = '/health'

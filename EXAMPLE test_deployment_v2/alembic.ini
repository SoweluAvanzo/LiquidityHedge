# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend for loading custom envs
prepend_sys_path = .

# Timezone for generating timestamps
# timezone =

# Max length of characters for autogenerate message slug
truncate_slug_length = 40

# Set to 'true' to run in "offline" mode, which creates SQL
# scripts instead of executing against the database.
# revision_environment = false

# Set to 'true' to enable batch mode for DDL operations
# batch_mode = false

# Configures generation of primary key constraint names
# naming_convention = <see SQLAlchemy docs>

# Version path separator
# version_path_separator = os
#
# Use os.pathsep (OS-specific path separator)
# version_path_separator = os

# version_locations looks for locations containing versions
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Set to true to require POST to start each migration transaction
# post_write_hooks = true

# The output encoding for autogenerated files
# output_encoding = utf-8

# Database URL (will be overridden by env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Post write hooks for formatting generated files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

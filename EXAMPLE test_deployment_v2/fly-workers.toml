# Fly.io configuration for LP Strategy Celery Workers
# Deploy with: flyctl deploy -c test_deployment_v2/fly-workers.toml

app = "lp-strategy-workers"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.workers"

[env]
  # Worker settings
  ENV = "production"
  LOG_LEVEL = "INFO"

  # Celery settings
  CELERY_CONCURRENCY = "4"

  # Data directory
  DATA_DIR = "/data"

# Workers don't need HTTP service, they just process tasks
# But we add a health check endpoint for monitoring
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[mounts]
  source = "lp_workers_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
